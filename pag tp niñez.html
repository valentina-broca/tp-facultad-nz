<!DOCTYPE HTML>
<html>
    <head>
        <title>TP VINCULOS TEMPRANOS Y LENGUAJE</title>
        <link rel="stylesheet" href="estilosvinculos.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
    <h1>TALLER ORIENCIACION PARENTAL</h1>
    <div>
       <img src="familias2.jpg" class="banner">
    </div>
    <div class="menu">
        <button onclick="mostrar('apego')">
        Vinculos de Apego
        </button>

        <button onclick="mostrar('lenguaje')">
            Lenguaje
        </button>
        
        <button onclick="mostrar('Juego')">
            Rol del juego
        </button>

        <button onclick="mostrar('Dibujo')">
            Rol de los dibujos
        </button>

    </div>
        <div id="apego" class="contenido">
            <h2>Vinculos de Apego</h2>
            <p> hnieubcwikebk</p>
        </div>

        <div id="lenguaje" class="contenido">
            <h2>Lenguaje</h2>
            <p>kbiweubwieb</p>
        </div>

        <div id="Juego" class="contenido">
           <img src="construccion.jpg" class="imagenes">
        </div>

        <div id="Dibujo" class="contenido">
           <img src="construccion.jpg" class="imagenes">
        </div>
    
    
    <script>
        function mostrar(id) {
            let secciones =
            document.querySelectorAll('.contenido');

            secciones.forEach(seccion => {
                seccion.style.display="none";
            });

            document.getElementById(id).style.display="block";
        }
    </script>
    </body>
</html>
